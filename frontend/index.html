    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JT69YMLED0"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      window.gtag = function gtag() {
        window.dataLayer.push(arguments);
      };
      window.gtag('js', new Date());
      window.gtag('config', 'G-JT69YMLED0', { send_page_view: false });
    </script>
    <script>
      (() => {
        const cacheKey = 'mm_home_banner_cache';
        const cacheTtlMs = 24 * 60 * 60 * 1000;
        const uploadSegment = '/image/upload/';
        const sizes = '(max-width: 768px) 100vw, 760px';
        const widths = [320, 480, 640, 760];
        const aspectRatio = 428 / 760;

        const buildCloudinaryUrl = (source, width) => {
          if (
            typeof source !== 'string' ||
            !source.includes('res.cloudinary.com') ||
            !source.includes(uploadSegment)
          ) {
            return String(source || '').trim();
          }

          const normalizedWidth = Math.round(Number(width));
          const normalizedHeight = Math.round(normalizedWidth * aspectRatio);
          const transforms = [
            'f_auto',
            'q_auto:eco',
            'dpr_auto',
            'c_fill',
            'g_auto',
            `w_${normalizedWidth}`,
            `h_${normalizedHeight}`,
          ].join(',');

          return source.replace(uploadSegment, `${uploadSegment}${transforms}/`);
        };

        try {
          const parsed = JSON.parse(window.localStorage.getItem(cacheKey) || '{}');
          const images = Array.isArray(parsed?.images)
            ? parsed.images.map((image) => String(image || '').trim()).filter(Boolean).slice(0, 3)
            : [];
          const storedAt = Number(parsed?.storedAt || 0);

          if (!images.length || !storedAt || Date.now() - storedAt > cacheTtlMs) {
            return;
          }

          const source = images[0];
          const preloadLink = document.createElement('link');
          preloadLink.rel = 'preload';
          preloadLink.as = 'image';
          preloadLink.href = buildCloudinaryUrl(source, widths[widths.length - 1]);

          if (source.includes('res.cloudinary.com') && source.includes(uploadSegment)) {
            preloadLink.imageSrcset = widths
              .map((width) => `${buildCloudinaryUrl(source, width)} ${width}w`)
              .join(', ');
            preloadLink.imageSizes = sizes;
          }

          document.head.appendChild(preloadLink);
        } catch (error) {
          // ignore preload bootstrap failures
        }
      })();
    </script>
